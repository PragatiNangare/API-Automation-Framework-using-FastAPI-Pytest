name: API Automation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allows manual run from GitHub Actions tab

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Start FastAPI server in the background
      - name: Start FastAPI server
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server to be ready..."
          sleep 5

      # 5. Run pytest with Allure
      - name: Run Pytest
        run: |
          pytest test_api.py \
            --alluredir=allure-results \
            -v \
            --tb=short
        continue-on-error: true   # so Allure report still uploads even if tests fail

      # 6. Install Allure CLI
      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # 7. Generate Allure HTML report
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # 8. Upload Allure report as artifact (always, pass or fail)
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # 9. Upload raw allure-results too (useful for trend history)
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      # 10. Publish Allure report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
